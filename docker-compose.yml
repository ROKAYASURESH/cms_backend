services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # ✅ persist DB data

  web:
    build: .
    command: >
      sh -c "
      sleep 5 &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: cms_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    volumes:
      - .:/app   # ✅ sync local code with container

volumes:
  postgres_data: